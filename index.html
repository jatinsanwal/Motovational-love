<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  color: white;
}

.page {
  height: 100vh;
  width: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 30px;
  flex-direction: column;
}

.active {
  display: flex;
  animation: fade 1s ease;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

h1 {
  margin-bottom: 15px;
}

p {
  font-size: 18px;
  max-width: 500px;
  line-height: 1.7;
  min-height: 120px;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d88;
  font-weight: bold;
  cursor: pointer;
}

/* CHITS */
.chits {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.chit {
  width: 80px;
  height: 80px;
  background: white;
  color: #ff4d88;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transform: rotate(15deg);
  transition: 0.5s;
  position: relative;
  overflow: hidden;
}

.chit::before {
  content: "💌";
  position: absolute;
  font-size: 30px;
}

.chit.open {
  transform: rotate(0) scale(1.2);
  background: #fff0f5;
  font-size: 20px;
}

/* typing cursor */
.cursor {
  display: inline-block;
  width: 2px;
  background: white;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% {opacity: 1;}
  25%,75% {opacity: 0;}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hey ❤️</h1>
  <p id="text1"></p>
  <button onclick="nextPage('p2')">Start 💖</button>
</div>

<!-- GAME -->
<div class="page" id="p2">
  <h1>Pick one 💌</h1>
  <p id="text2"></p>

  <div class="chits">
    <div class="chit" onclick="pick(this,85)"></div>
    <div class="chit" onclick="pick(this,87)"></div>
    <div class="chit" onclick="pick(this,90)"></div>
    <div class="chit" onclick="pick(this,89)"></div>
  </div>
</div>

<!-- RESULT -->
<div class="page" id="p3">
  <h1>🎉 Hurrayyy 🎉</h1>
  <h2 id="result"></h2>
  <p id="text3"></p>
  <button onclick="nextPage('p4')">Next ❤️</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h1>Listen ❤️</h1>
  <p id="text4"></p>
</div>

<script>

// typing effect
function typeText(id, text, speed=40) {
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";
  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      el.innerHTML += '<span class="cursor"></span>';
    }
  }
  typing();
}

// messages
typeText("text1",
`Mujhe pata hai aajkal tum thoda stress feel kar rahi ho... 😔

Result ka pressure, periods ka pain… sab ek sath aana easy nahi hota 💔

But ek baat yaad rakhna — Tum already bohot strong ho 💖

Aur main… hamesha tumhare saath hoon 🤍`
);

typeText("text2",
`Jo tum choose karogi… wahi tumhari destiny 😉💖`
);

// navigation
function nextPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="p3"){
    typeText("text3",
`Dekhaaa 😍 itni acchi percentage 💖

Par sach bataun… Ye sab sirf ek game hai 💭

Real life me sabse important hoti hai tumhari mehnat 💪✨`
);
  }

  if(id==="p4"){
    typeText("text4",
`Marks kabhi bhi tumhari value define nahi karte 💯

Jo tum ho… woh already enough hai 💖

Bas ab thoda focus aage ke paper pe lagate hain 💪📚
SSC ho ya koi bhi exam… tum kar logi 🤍

Aur jab bhi tumhe lage ki tum thak gayi ho…
ya demotivated feel ho rahi ho… 😔

Bas mere paas aajana 💌
Mujhse baat kar lena… sab share kar lena 💞

Main hamesha tumhare saath hoon… aaj, kal… aur hamesha ❤️

Take care my strong girl 💖`
);
  }
}

// chit animation
function pick(el, percent){
  el.classList.add("open");
  el.innerHTML = percent + "% 💖";

  setTimeout(()=>{
    nextPage("p3");
    document.getElementById("result").innerText = percent + "% 💖";
  },1000);
}

</script>

</body>
</html>
